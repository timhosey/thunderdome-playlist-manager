name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: ThunderdomePlaylistManager.exe
            asset_name: ThunderdomePlaylistManager-windows.exe
            archive: false
          - os: ubuntu-latest
            artifact_name: ThunderdomePlaylistManager
            asset_name: ThunderdomePlaylistManager-linux.tar.gz
            archive: true
          - os: macos-latest
            artifact_name: ThunderdomePlaylistManager
            asset_name: ThunderdomePlaylistManager-macos.tar.gz
            archive: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --noconfirm thunderdome.spec

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ matrix.archive }}" = "true" ]; then
            chmod +x "dist/${{ matrix.artifact_name }}"
            tar -czf "out/${{ matrix.asset_name }}" -C dist "${{ matrix.artifact_name }}"
          else
            cp "dist/${{ matrix.artifact_name }}" "out/${{ matrix.asset_name }}"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset_name }}
